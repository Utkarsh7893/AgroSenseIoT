<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your AgroSense IoT account to start monitoring your crops with smart IoT technology.">
  <title>Sign Up — AgroSense IoT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { inter: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] } } }
    }
  </script>
</head>

<body class="auth-bg">

  <!-- Three.js Canvas Background (sits on top of bg image, behind content) -->
  <canvas id="nature-canvas"></canvas>

  <!-- Back Button -->
  <div class="fixed top-6 left-6 z-50 animate-fade-in" style="animation-delay: 0.1s;">
    <a href="../index.html" class="back-btn">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Login
    </a>
  </div>

  <!-- Sign Up Card -->
  <div class="flex items-center justify-center min-h-screen px-4 py-12">
    <div class="glass-card p-8 md:p-10 w-full max-w-md animate-fade-in-up" style="animation-delay: 0.2s;">
      
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-green-400 to-emerald-600 rounded-2xl shadow-lg mb-4">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
        </div>
        <h1 class="text-2xl font-bold font-outfit text-green-800">Create Your Account</h1>
        <p class="text-sm text-gray-500 mt-1">Join AgroSense IoT today</p>
      </div>

      <form id="signupForm" class="space-y-4" action="../backend/sign_up.php" method="POST">
        <div>
          <label for="name" class="form-label">Full Name</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Enter your name" required>
        </div>
        <div>
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div>
          <label for="Username" class="form-label">Username</label>
          <input type="text" id="Username" name="Username" class="form-input" placeholder="Choose a username" required>
        </div>
        <div>
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
          <div class="mt-2 h-1.5 rounded-full bg-gray-200 overflow-hidden">
            <div id="passwordStrength" class="h-full rounded-full transition-all duration-500" style="width: 0%; background: #ef4444;"></div>
          </div>
          <p id="passwordHint" class="text-xs text-gray-400 mt-1">Use 8+ characters with letters & numbers</p>
        </div>
        <div>
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary w-full py-3 text-base">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Create Account
        </button>
      </form>

      <p class="mt-5 text-center text-sm text-gray-600">
        Already have an account?
        <a href="../index.html" class="text-green-700 font-semibold hover:text-green-900 transition-colors">Login</a>
      </p>
    </div>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="../js/nature-bg.js"></script>

  <!-- Password strength indicator -->
  <script>
    const pw = document.getElementById('password');
    const bar = document.getElementById('passwordStrength');
    const hint = document.getElementById('passwordHint');

    pw.addEventListener('input', () => {
      const val = pw.value;
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^a-zA-Z0-9]/.test(val)) score++;

      const colors = ['#ef4444', '#f59e0b', '#eab308', '#22c55e', '#16a34a'];
      const widths = ['20%', '40%', '60%', '80%', '100%'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong', 'Excellent'];

      const idx = Math.min(score, 5) - 1;
      if (idx >= 0) {
        bar.style.width = widths[idx];
        bar.style.background = colors[idx];
        hint.textContent = labels[idx];
        hint.style.color = colors[idx];
      } else {
        bar.style.width = '0%';
        hint.textContent = 'Use 8+ characters with letters & numbers';
        hint.style.color = '#9ca3af';
      }
    });
  </script>
</body>

</html>
